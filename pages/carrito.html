<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../assets/img/sbicon.ico">
  <link rel="stylesheet" href="../assets/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <title>Carrito | Sabina Accesorios</title>
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="productos.html">Productos</a></li>
        <li><a href="contactos.html">Contactos</a></li>
        <li><a href="carrito.html" id="nav-cart">🛒 (<span id="badgeCarrito">0</span>)</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="hero">
      <img class="logo" src="../assets/img/4.png" alt="Logo Sabina Accesorios">
    </section>
    
    <section class="carrito-wrap container">
      <h1>Tu carrito</h1>

      <div class="carrito-grid">
        <div class="tabla-card">
          <table class="tabla">
            <thead>
              <tr>
                <th>Producto</th>
                <th class="num">Precio</th>
                <th class="center">Cantidad</th>
                <th class="num">Subtotal</th>
              </tr>
            </thead>
            <tbody id="cart-body"></tbody>
          </table>
          <div id="cart-empty" class="vacio" hidden>Tu carrito está vacío.</div>
        </div>

        <aside class="resumen-card">
          <h2>Resumen</h2>
          <div class="resumen-row">
            <span>Items:</span>
            <strong id="resumen-items">0</strong>
          </div>
          <div class="resumen-row">
            <span>Total:</span>
            <strong id="resumen-total">$ 0</strong>
          </div>
          <div class="resumen-actions">
            <a class="btn btn-sec" href="productos.html">Seguir comprando</a>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2025 Sabina Accesorios - Todos los derechos reservados.</p>
  </footer>

  <script type="module" src="../assets/js/carrito.js"></script>
</body>
</html>
